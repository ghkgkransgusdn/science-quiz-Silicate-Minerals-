<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>통합과학 문제풀이 · 화학 결합 · 규산염 광물</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Jua&display=swap">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #f3f4f6;
    color: #18181b;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: 'ss01', 'ss02';
  }
  .app-bg { 
    background: #f3f4f6;
    min-height: 100vh; 
  }
  .font-jua { font-family: 'Jua', 'Pretendard Variable', sans-serif; letter-spacing: -0.02em; }
  .font-black-han { font-family: 'Black Han Sans', 'Pretendard Variable', sans-serif; letter-spacing: -0.01em; }
  .font-num { font-family: 'Pretendard Variable', sans-serif; font-weight: 800; font-variant-numeric: tabular-nums lining-nums; letter-spacing: -0.04em; }
  
  .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
  .slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Cards with chunky shadow (Duolingo/Brilliant style) */
  .chunky-card {
    background: #ffffff;
    border-radius: 20px;
    border: 2px solid #e5e7eb;
    box-shadow: 0 4px 0 #e5e7eb;
    transition: all 0.15s;
  }
  .chunky-card.pressable:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #e5e7eb;
  }
  
  .soft-card {
    background: #ffffff;
    border-radius: 16px;
    border: 1.5px solid #e5e7eb;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  
  /* Hero gradient card */
  .hero-card {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
    border-radius: 24px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .hero-card::before {
    content: '';
    position: absolute;
    top: -50%; right: -20%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(251,191,36,0.25) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-card::after {
    content: '';
    position: absolute;
    bottom: -40%; left: -10%;
    width: 250px; height: 250px;
    background: radial-gradient(circle, rgba(167,139,250,0.2) 0%, transparent 70%);
    pointer-events: none;
  }
  
  /* Buttons */
  .btn-primary {
    background: #18181b;
    color: #fff;
    font-weight: 700;
    border-radius: 14px;
    padding: 14px 28px;
    transition: all 0.15s;
    cursor: pointer;
    border: none;
    box-shadow: 0 4px 0 #3f3f46;
    font-size: 15px;
    letter-spacing: -0.01em;
  }
  .btn-primary:hover:not(:disabled) { background: #27272a; }
  .btn-primary:active:not(:disabled) { 
    transform: translateY(2px);
    box-shadow: 0 2px 0 #3f3f46;
  }
  .btn-primary:disabled { 
    background: #d4d4d8; color: #fff; cursor: not-allowed;
    box-shadow: 0 4px 0 #a1a1aa;
  }
  .btn-secondary {
    background: #fff; color: #18181b; font-weight: 700;
    border-radius: 14px; padding: 14px 24px;
    border: 2px solid #e5e7eb;
    box-shadow: 0 4px 0 #e5e7eb;
    transition: all 0.15s; cursor: pointer;
    font-size: 15px;
  }
  .btn-secondary:hover { background: #fafafa; }
  .btn-secondary:active { 
    transform: translateY(2px);
    box-shadow: 0 2px 0 #e5e7eb;
  }
  
  /* Choice buttons */
  .choice-btn {
    width: 100%; text-align: left; padding: 18px 20px; border-radius: 16px;
    background: #fff; 
    border: 2px solid #e5e7eb;
    box-shadow: 0 3px 0 #e5e7eb;
    transition: all 0.15s;
    display: flex; align-items: center; gap: 16px; cursor: pointer;
  }
  .choice-btn:hover:not(:disabled) { background: #fafafa; }
  .choice-btn:active:not(:disabled) { 
    transform: translateY(2px);
    box-shadow: 0 1px 0 #e5e7eb;
  }
  .choice-btn.selected { 
    border-color: #4338ca; 
    background: #eef2ff;
    box-shadow: 0 3px 0 #4338ca;
  }
  .choice-btn.correct { 
    border-color: #10b981; 
    background: #ecfdf5; 
    color: #064e3b;
    box-shadow: 0 3px 0 #10b981;
  }
  .choice-btn.wrong { 
    border-color: #ef4444; 
    background: #fef2f2; 
    color: #7f1d1d;
    box-shadow: 0 3px 0 #ef4444;
  }
  .choice-btn:disabled { cursor: default; }
  .choice-num {
    flex-shrink: 0; width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid currentColor; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 15px;
  }
  
  /* Problem image */
  .problem-img { width: 100%; max-width: 100%; height: auto; display: block; border-radius: 8px; }
  
  /* Misc */
  button { -webkit-tap-highlight-color: transparent; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }
  
  /* Progress ring */
  .progress-ring { transform: rotate(-90deg); }
  
  /* Difficulty pill */
  .diff-pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 700;
  }
</style>
</head>

// Robust storage: tries window.storage (Claude artifact), then localStorage, then in-memory
const memStore = {};
const storage = {
  async get(key, fallback = null) {
    try {
      if (typeof window.storage?.get === 'function') {
        const r = await window.storage.get(key);
        return r ? JSON.parse(r.value) : fallback;
      }
    } catch(_) {}
    try {
      const v = localStorage.getItem(key);
      return v != null ? JSON.parse(v) : fallback;
    } catch(_) {}
    return memStore[key] != null ? memStore[key] : fallback;
  },
  async set(key, value) {
    const s = JSON.stringify(value);
    try {
      if (typeof window.storage?.set === 'function') {
        await window.storage.set(key, s);
        return true;
      }
    } catch(_) {}
    try { localStorage.setItem(key, s); return true; } catch(_) {}
    memStore[key] = value;
    return true;
  }
};

// =========================================================
// DRAWING CANVAS
// =========================================================
function DrawingCanvas({ active, tool, color }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const [strokes, setStrokes] = useState([]);
  const currentStroke = useRef(null);
  const [size, setSize] = useState({ w: 0, h: 0 });

  useLayoutEffect(() => {
    const measure = () => {
      if (containerRef.current) {
        const rect = containerRef.current.getBoundingClientRect();
        if (rect.width > 0 && rect.height > 0) setSize({ w: rect.width, h: rect.height });
      }
    };
    measure();
    const obs = new ResizeObserver(measure);
    if (containerRef.current) obs.observe(containerRef.current);
    return () => obs.disconnect();
  }, []);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas || size.w === 0) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = size.w * dpr;
    canvas.height = size.h * dpr;
    canvas.style.width = size.w + 'px';
    canvas.style.height = size.h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    redrawAll();
  }, [size, strokes]);

  const drawStroke = (ctx, s) => {
    if (!s.points || s.points.length < 1) return;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (s.tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.lineWidth = 18;
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = s.color; ctx.lineWidth = 2.4;
    }
    ctx.beginPath();
    if (s.points.length === 1) {
      const p = s.points[0];
      ctx.arc(p.x, p.y, ctx.lineWidth / 2, 0, Math.PI * 2);
      ctx.fillStyle = ctx.strokeStyle;
      ctx.fill(); return;
    }
    ctx.moveTo(s.points[0].x, s.points[0].y);
    for (let i = 1; i < s.points.length; i++) ctx.lineTo(s.points[i].x, s.points[i].y);
    ctx.stroke();
  };

  const redrawAll = () => {
    const canvas = canvasRef.current; if (!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.save(); ctx.setTransform(1,0,0,1,0,0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
    for (const s of strokes) drawStroke(ctx, s);
  };

  const getPoint = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  };

  const handlePointerDown = (e) => {
    if (!active) return; e.preventDefault();
    try { e.currentTarget.setPointerCapture(e.pointerId); } catch(_) {}
    const pt = getPoint(e);
    currentStroke.current = { tool, color, points: [pt] };
    drawStroke(canvasRef.current.getContext('2d'), currentStroke.current);
  };
  const handlePointerMove = (e) => {
    if (!active || !currentStroke.current) return; e.preventDefault();
    const pt = getPoint(e);
    const s = currentStroke.current;
    s.points.push(pt);
    const ctx = canvasRef.current.getContext('2d');
    const len = s.points.length; if (len < 2) return;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if (s.tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)'; ctx.lineWidth = 18;
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = s.color; ctx.lineWidth = 2.4;
    }
    ctx.beginPath();
    ctx.moveTo(s.points[len-2].x, s.points[len-2].y);
    ctx.lineTo(s.points[len-1].x, s.points[len-1].y);
    ctx.stroke();
  };
  const handlePointerUp = () => {
    if (!currentStroke.current) return;
    const s = currentStroke.current;
    if (s.points.length > 0) setStrokes(prev => [...prev, s]);
    currentStroke.current = null;
  };

  useEffect(() => {
    window.__drawingApi = {
      undo: () => setStrokes(prev => prev.slice(0, -1)),
      clear: () => setStrokes([])
    };
  }, []);

  return (
    <div ref={containerRef} className="absolute inset-0">
      <canvas ref={canvasRef}
        onPointerDown={handlePointerDown} onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp} onPointerCancel={handlePointerUp} onPointerLeave={handlePointerUp}
        style={{ touchAction: 'none', pointerEvents: active ? 'auto' : 'none',
          cursor: active ? (tool === 'eraser' ? 'cell' : 'crosshair') : 'default' }}
        className="block" />
    </div>
  );
}

// Circular progress ring
function ProgressRing({ pct, size = 120, stroke = 10, color = '#ffffff' }) {
  const radius = (size - stroke) / 2;
  const circ = 2 * Math.PI * radius;
  const offset = circ - (pct / 100) * circ;
  return (
    <svg width={size} height={size} className="progress-ring">
      <circle cx={size/2} cy={size/2} r={radius} 
        fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={radius}
        fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset}
        strokeLinecap="round"
        style={{ transition: 'stroke-dashoffset 0.7s ease-out' }} />
    </svg>
  );
}

                    className="w-10 h-10 rounded-xl text-zinc-600 hover:bg-zinc-200 transition-colors flex items-center justify-center"><Icons.Undo size={18} /></button>
                  <button onClick={() => window.__drawingApi?.clear()}
                    className="w-10 h-10 rounded-xl text-zinc-600 hover:bg-zinc-200 transition-colors flex items-center justify-center"><Icons.Trash size={18} /></button>
                </>
              )}
            </div>
            <div className="flex-1" />
            {!submitted ? (
              <button onClick={submit} disabled={selected === null} className="btn-primary">답 확인</button>
            ) : (
              <button onClick={next} className="btn-primary flex items-center gap-2">
                {isLast ? '완료' : '다음 문제'}<Icons.ChevronR size={18} stroke={2.5} />
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function CompletionScreen({ stats, onHome, onRestart }) {
  const total = stats.correct + stats.wrong;
  const pct = total > 0 ? Math.round((stats.correct / total) * 100) : 0;
  const tier = pct === 100 ? { msg: '완벽해요!', emoji: '🎉', color: '#16a34a' } 
            : pct >= 80 ? { msg: '훌륭해요!', emoji: '🌟', color: '#f59e0b' }
            : pct >= 60 ? { msg: '잘 했어요', emoji: '👍', color: '#3b82f6' }
            : { msg: '다시 도전!', emoji: '💪', color: '#ef4444' };

  return (
    <div className="app-bg min-h-screen flex items-center justify-center p-5">
      <div className="max-w-md w-full chunky-card p-8 text-center fade-in">
        <div className="text-6xl mb-3">{tier.emoji}</div>
        <h2 className="font-jua text-[28px] text-zinc-900 mb-1">{tier.msg}</h2>
        <p className="text-zinc-500 text-[14px] mb-7">학습을 완료했어요</p>
        
        <div className="bg-zinc-50 rounded-2xl p-6 mb-6 border-2 border-zinc-100">
          <div className="font-num text-[64px] leading-none mb-2 tracking-tight" style={{ color: tier.color }}>
            {pct}<span className="text-[28px] text-zinc-400">%</span>
          </div>
          <div className="text-[12px] text-zinc-500 mb-4 font-medium">정답률</div>
          <div className="flex items-center justify-center gap-6 text-[13px] pt-4 border-t border-zinc-200">
            <div className="flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
              <span className="text-zinc-600">정답</span>
              <span className="font-num text-emerald-700 text-[16px]">{stats.correct}</span>
            </div>
            <div className="w-px h-5 bg-zinc-300" />
            <div className="flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full bg-red-500"></span>
              <span className="text-zinc-600">오답</span>
              <span className="font-num text-red-700 text-[16px]">{stats.wrong}</span>
            </div>
          </div>
        </div>
        
        <div className="flex gap-3">
          <button onClick={onRestart} className="btn-secondary flex-1">다시 풀기</button>
          <button onClick={onHome} className="btn-primary flex-1">홈으로</button>
        </div>
      </div>
    </div>
  );
}

function StatsScreen({ stats, history, onBack, onResetDifficulty, onResetAll }) {
  const byDiff = ['easy', 'medium', 'hard'];
  const diffMeta = {
    easy: { label: '하 · 기초', color: '#16a34a', bg: '#dcfce7', emoji: '🌱' },
    medium: { label: '중 · 표준', color: '#2563eb', bg: '#dbeafe', emoji: '🎯' },
    hard: { label: '상 · 심화', color: '#dc2626', bg: '#fee2e2', emoji: '🔥' }
  };

  // Track which reset buttons are in "confirm" state
  const [confirming, setConfirming] = useState(null); // 'easy' | 'medium' | 'hard' | 'all' | null

  const handleResetClick = (target) => {
    if (confirming === target) {
      if (target === 'all') onResetAll();
      else onResetDifficulty(target);
      setConfirming(null);
    } else {
      setConfirming(target);
      // Auto-cancel after 4 seconds if user doesn't confirm
      setTimeout(() => setConfirming(c => c === target ? null : c), 4000);
    }
  };

  const total = byDiff.reduce((a, d) => a + (stats[d]?.total || 0), 0);
  const correct = byDiff.reduce((a, d) => a + (stats[d]?.correct || 0), 0);
  const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

  const topicMistakes = {};
  history.forEach(h => {
    if (!h.correct) {
      const p = PROBLEMS.find(x => x.id === h.id);
      if (p) topicMistakes[p.topic] = (topicMistakes[p.topic] || 0) + 1;
    }
  });
  const topTopics = Object.entries(topicMistakes).sort((a,b) => b[1]-a[1]).slice(0, 5);

  return (
    <div className="app-bg min-h-screen">
      <div className="max-w-2xl mx-auto px-5 py-6 pb-12">
        <header className="mb-6 flex items-center gap-3">
          <button onClick={onBack} className="w-10 h-10 -ml-2 rounded-xl hover:bg-zinc-100 transition-colors flex items-center justify-center"><Icons.ArrowLeft size={20} /></button>
          <h1 className="font-jua text-[24px] text-zinc-900">학습 통계</h1>
        </header>

        <div className="chunky-card p-6 mb-4">
          <div className="text-[11px] font-bold text-zinc-500 tracking-widest uppercase mb-3">전체 진도</div>
          <div className="flex items-baseline gap-2 mb-4">
            <span className="font-num text-[56px] leading-none text-zinc-900 tracking-tight">{pct}</span>
            <span className="text-[24px] text-zinc-400 font-num">%</span>
            <span className="text-[13px] text-zinc-500 ml-auto font-num">
              <span className="font-bold text-zinc-700">{correct}</span> / {total}
            </span>
          </div>
          <div className="h-3 bg-zinc-100 rounded-full overflow-hidden">
            <div className="h-full bg-gradient-to-r from-indigo-500 to-violet-500 transition-all duration-700 ease-out rounded-full" style={{ width: `${pct}%` }} />
          </div>
        </div>

        <div className="chunky-card p-6 mb-4">
          <div className="flex items-center justify-between mb-5">
            <div className="text-[11px] font-bold text-zinc-500 tracking-widest uppercase">난이도별 성과</div>
            <div className="text-[10px] text-zinc-400">탭해서 초기화</div>
          </div>
          <div className="space-y-5">
            {byDiff.map(d => {
              const s = stats[d] || { total: 0, correct: 0 };
              const dPct = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
              const diffTotal = PROBLEMS.filter(p => p.difficulty === d).length;
              const meta = diffMeta[d];
              const isConfirming = confirming === d;
              const hasData = s.total > 0;
              return (
                <div key={d}>
                  <div className="flex items-center justify-between mb-2 gap-2">
                    <div className="flex items-center gap-2.5 min-w-0">
                      <div className="w-9 h-9 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{ background: meta.bg }}>{meta.emoji}</div>
                      <span className="font-jua text-[15px] text-zinc-800">{meta.label}</span>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <span className="text-[12px] text-zinc-500 font-num whitespace-nowrap">
                        <span className="font-bold text-zinc-700">{s.correct}</span> / {s.total}
                      </span>
                      {hasData && (
                        isConfirming ? (
                          <button onClick={() => handleResetClick(d)}
                            className="text-[11px] font-bold px-2.5 py-1 rounded-lg bg-red-500 text-white hover:bg-red-600 transition-colors">
                            정말 초기화?
                          </button>
                        ) : (
                          <button onClick={() => handleResetClick(d)}
                            className="w-7 h-7 rounded-lg hover:bg-zinc-100 transition-colors flex items-center justify-center text-zinc-400 hover:text-red-500"
                            title={`${meta.label} 기록 초기화`}>
                            <Icons.Rotate size={14} />
                          </button>
                        )
                      )}
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex-1 relative h-2.5 bg-zinc-100 rounded-full overflow-hidden">
                      <div className="h-full transition-all duration-700 ease-out rounded-full" style={{ width: `${dPct}%`, background: meta.color }} />
                    </div>
                    <span className="font-num text-[14px] min-w-[40px] text-right" style={{ color: meta.color }}>{dPct}%</span>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {topTopics.length > 0 && (
          <div className="chunky-card p-6 mb-4">
            <div className="flex items-baseline justify-between mb-4">
              <div className="text-[11px] font-bold text-zinc-500 tracking-widest uppercase">취약 개념</div>
              <div className="text-[11px] text-zinc-400">자주 틀린 주제 Top {topTopics.length}</div>
            </div>
            <div className="space-y-2">
              {topTopics.map(([topic, count], i) => (
                <div key={topic} className="flex items-center gap-3 p-3 rounded-xl bg-zinc-50">
                  <span className="w-8 h-8 rounded-full bg-red-100 text-red-700 font-num text-[14px] flex items-center justify-center flex-shrink-0">{i+1}</span>
                  <span className="flex-1 text-[14px] text-zinc-800 font-medium">{topic}</span>
                  <span className="text-[12px] text-zinc-500"><span className="font-num font-bold text-red-600">{count}</span>회 오답</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {total === 0 && (
          <div className="chunky-card p-10 text-center text-zinc-400">
            <div className="text-4xl mb-3">📚</div>
            <div className="text-[14px] font-medium">아직 푼 문제가 없어요</div>
            <div className="text-[12px] mt-1">홈에서 난이도를 선택해 시작해보세요</div>
          </div>
        )}

        {/* 전체 기록 초기화 — 화면 맨 아래, 위험도 있는 만큼 눈에 덜 띄게 */}
        {total > 0 && (
          <div className="mt-8 pt-6 border-t border-zinc-200">
            <div className="text-center">
              <div className="text-[11px] text-zinc-400 mb-3">
                모든 난이도의 기록을 한 번에 지울 수 있어요
                <br/>
                <span className="text-zinc-300">(즐겨찾기는 유지됩니다)</span>
              </div>
              {confirming === 'all' ? (
                <div className="flex items-center justify-center gap-2">
                  <button onClick={() => setConfirming(null)}
                    className="px-4 py-2 rounded-xl text-[13px] font-bold text-zinc-600 hover:bg-zinc-100 transition-colors">
                    취소
                  </button>
                  <button onClick={() => handleResetClick('all')}
                    className="px-5 py-2 rounded-xl text-[13px] font-bold bg-red-500 text-white hover:bg-red-600 transition-colors"
                    style={{ boxShadow: '0 3px 0 #b91c1c' }}>
                    정말 모두 초기화
                  </button>
                </div>
              ) : (
                <button onClick={() => handleResetClick('all')}
                  className="inline-flex items-center gap-1.5 px-4 py-2 rounded-xl text-[12px] font-bold text-zinc-500 hover:text-red-500 hover:bg-red-50 transition-colors">
                  <Icons.Trash size={14} />
                  전체 기록 초기화
                </button>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [view, setView] = useState('loading');
  const [currentProblems, setCurrentProblems] = useState([]);
  const [quizTitle, setQuizTitle] = useState('');
  const [lastSessionStats, setLastSessionStats] = useState({ correct: 0, wrong: 0 });
  const [stats, setStats] = useState({ easy: { total: 0, correct: 0 }, medium: { total: 0, correct: 0 }, hard: { total: 0, correct: 0 } });
  const [wrongIds, setWrongIds] = useState([]);
  const [starredIds, setStarredIds] = useState([]);
  const [history, setHistory] = useState([]);

  useEffect(() => {
    (async () => {
      const s = await storage.get(STORAGE_KEYS.STATS, { easy: { total: 0, correct: 0 }, medium: { total: 0, correct: 0 }, hard: { total: 0, correct: 0 } });
      const w = await storage.get(STORAGE_KEYS.WRONG, []);
      const st = await storage.get(STORAGE_KEYS.STARRED, []);
      const h = await storage.get(STORAGE_KEYS.HISTORY, []);
      setStats(s); setWrongIds(w); setStarredIds(st); setHistory(h);
      setView('home');
    })();
  }, []);

  const startQuiz = (difficulty) => {
    const shuffled = [...PROBLEMS.filter(p => p.difficulty === difficulty)].sort(() => Math.random() - 0.5);
    if (shuffled.length === 0) return;
    setCurrentProblems(shuffled);
    const labels = { easy: '하 · 기초', medium: '중 · 표준', hard: '상 · 심화' };
    setQuizTitle(labels[difficulty]); setView('quiz');
  };
  const startReview = () => {
    const probs = PROBLEMS.filter(p => wrongIds.includes(p.id));
    if (probs.length === 0) return;
    setCurrentProblems(probs); setQuizTitle('오답 다시 풀기'); setView('quiz');
  };
  const startStarred = () => {
    const probs = PROBLEMS.filter(p => starredIds.includes(p.id));
    if (probs.length === 0) return;
    setCurrentProblems(probs); setQuizTitle('즐겨찾기'); setView('quiz');
  };
  const logAnswer = async (problem, correct) => {
    const d = problem.difficulty;
    const newStats = { ...stats, [d]: { total: (stats[d]?.total || 0) + 1, correct: (stats[d]?.correct || 0) + (correct ? 1 : 0) } };
    setStats(newStats);
    await storage.set(STORAGE_KEYS.STATS, newStats);
    let newWrong = [...wrongIds];
    if (!correct) { if (!newWrong.includes(problem.id)) newWrong.push(problem.id); }
    else { newWrong = newWrong.filter(id => id !== problem.id); }
    setWrongIds(newWrong);
    await storage.set(STORAGE_KEYS.WRONG, newWrong);
    const newHistory = [...history, { id: problem.id, correct, timestamp: Date.now(), difficulty: d }].slice(-500);
    setHistory(newHistory);
    await storage.set(STORAGE_KEYS.HISTORY, newHistory);
  };
  const toggleStar = async (id) => {
    const newStarred = starredIds.includes(id) ? starredIds.filter(x => x !== id) : [...starredIds, id];
    setStarredIds(newStarred);
    await storage.set(STORAGE_KEYS.STARRED, newStarred);
  };
  const completeQuiz = (sessionStats) => { setLastSessionStats(sessionStats); setView('completion'); };

  // Reset only one difficulty's stats + its wrong/history entries
  const resetDifficulty = async (difficulty) => {
    const newStats = { ...stats, [difficulty]: { total: 0, correct: 0 } };
    setStats(newStats);
    await storage.set(STORAGE_KEYS.STATS, newStats);

    // Remove wrong IDs that belong to this difficulty
    const idsInDiff = new Set(PROBLEMS.filter(p => p.difficulty === difficulty).map(p => p.id));
    const newWrong = wrongIds.filter(id => !idsInDiff.has(id));
    setWrongIds(newWrong);
    await storage.set(STORAGE_KEYS.WRONG, newWrong);

    // Remove history entries of this difficulty
    const newHistory = history.filter(h => h.difficulty !== difficulty);
    setHistory(newHistory);
    await storage.set(STORAGE_KEYS.HISTORY, newHistory);
  };

  // Full reset — clears stats, wrong list, history (keeps starred)
  const resetAll = async () => {
    const empty = { easy: { total: 0, correct: 0 }, medium: { total: 0, correct: 0 }, hard: { total: 0, correct: 0 } };
    setStats(empty);
    setWrongIds([]);
    setHistory([]);
    await storage.set(STORAGE_KEYS.STATS, empty);
    await storage.set(STORAGE_KEYS.WRONG, []);
    await storage.set(STORAGE_KEYS.HISTORY, []);
  };

  if (view === 'loading') return <div className="app-bg flex items-center justify-center min-h-screen"><div className="text-stone-400 text-sm font-medium">로딩 중...</div></div>;
  if (view === 'home') return <HomeScreen onStart={startQuiz} stats={stats} wrongCount={wrongIds.length} starredCount={starredIds.length} onReview={startReview} onStarred={startStarred} onStats={() => setView('stats')} />;
  if (view === 'quiz') return <QuizScreen problems={currentProblems} title={quizTitle} onExit={() => setView('home')} onComplete={completeQuiz} onAnswerLogged={logAnswer} onStarToggle={toggleStar} starredIds={starredIds} />;
  if (view === 'completion') return <CompletionScreen stats={lastSessionStats} onHome={() => setView('home')} onRestart={() => { setCurrentProblems(prev => [...prev].sort(() => Math.random() - 0.5)); setView('quiz'); }} />;
  if (view === 'stats') return <StatsScreen stats={stats} history={history} onBack={() => setView('home')} onResetDifficulty={resetDifficulty} onResetAll={resetAll} />;
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
